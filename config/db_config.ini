[mysql]
host = 127.0.0.1
port = 3306
user = smart_factory
password = your_mysql_password
database = smart_manufacturing
charset = utf8mb4
connect_timeout = 30
pool_size = 10
max_overflow = 20

[influxdb]
url = http://127.0.0.1:8086
token = your_influxdb_token
org = smart_factory
bucket = device_metrics
timeout = 30000
verify_ssl = false
connection_pool_size = 10

[sync]
direction = bidirectional
mode = preview
batch_size = 1000
retry_count = 3
retry_interval = 5
timeout = 3600
